site_name: MCP Security Summit Workshop
site_url: https://azure-samples.github.io/sherpa
site_description: A Sherpa's Guide to Securing Model Context Protocol Servers in Azure
site_author: Microsoft Azure Samples
repo_name: Azure-Samples/sherpa
repo_url: https://github.com/Azure-Samples/sherpa
edit_uri: edit/main/

# Copyright
copyright: Copyright &copy; 2025 Microsoft Corporation

theme:
  name: shadcn
  custom_dir: docs/overrides
  icon: sherpa-icon.png
  favicon: sherpa-icon.png
  language: en
  show_title: true
  show_stargazers: true
  topbar_sections: true
  show_datetime: true
  accent: "oklch(62.3% 0.214 259.815)"
  pygments_style:
    light: shadcn-light
    dark: github-dark

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      # The shadcn theme styles the legacy (interleaved input+label+content)
      # tab structure. alternate_style emits a grouped structure the theme's
      # CSS doesn't target, leaving tab content hidden. Keep this off.
      alternate_style: false
  - codehilite
  - pymdownx.highlight:
      # The shadcn theme styles code blocks via the `.codehilite` wrapper
      # (rounded card, copy button, line numbers). pymdownx defaults to the
      # `highlight` class, which the theme doesn't target — leaving code
      # blocks unstyled. Keep pymdownx emitting `codehilite` for superfences,
      # while the codehilite extension above makes shadcn load Pygments CSS.
      css_class: codehilite
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.progressbar
  - pymdownx.snippets
  - shadcn.extensions.iconify
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

# Navigation
nav:
  - Home: index.md
  - Prerequisites: prerequisites.md
  - The Journey:
    - Base Camp: camps/base-camp.md
    - Camp 1 - Identity:
      - "Overview & Deploy": camps/camp1-identity/index.md
      - Cloud Exploits: camps/camp1-identity/section1-cloud-exploits.md
      - Managed Identity: camps/camp1-identity/section2-managed-identity.md
      - Key Vault: camps/camp1-identity/section3-key-vault.md
      - OAuth & JWT: camps/camp1-identity/section4-oauth-jwt.md
      - Validate Security: camps/camp1-identity/section5-validate.md
    - Camp 2 - Gateway:
      - "Overview & Deploy": camps/camp2-gateway/index.md
      - Gateway & Authentication: camps/camp2-gateway/section1-gateway-governance.md
      - API Governance: camps/camp2-gateway/api-governance.md
      - Content Safety: camps/camp2-gateway/section2-content-safety.md
      - Network Security: camps/camp2-gateway/section3-network-security.md
    - Camp 3 - I/O Security:
      - "Overview & Deploy": camps/camp3-io-security/index.md
      - Understand Vulnerabilities: camps/camp3-io-security/section1-vulnerabilities.md
      - Layer 2 Security: camps/camp3-io-security/section2-layer2-security.md
      - Validate & Key Learnings: camps/camp3-io-security/section3-validation.md
    - Camp 4 - Monitoring:
      - "Overview & Deploy": camps/camp4-monitoring/index.md
      - Gateway Logging: camps/camp4-monitoring/section1-apim-logging.md
      - Function Observability: camps/camp4-monitoring/section2-function-observability.md
      - Dashboards & Alerts: camps/camp4-monitoring/section3-dashboards-alerts.md
      - Incident Response: camps/camp4-monitoring/section4-incident-response.md
      - Production Deployment: camps/camp4-monitoring/production-deploy.md
      - Reference: camps/camp4-monitoring/reference.md
    - The Summit: camps/summit.md
  - Resources:
    - Contributing: resources/contributing.md

# Plugins
plugins:
  - search

# Extra
extra:
  # Consumed by docs/overrides/templates/extra_head.html
  analytics_property: G-4X6V7HSB1J
  default_image: https://azure-samples.github.io/sherpa/images/sherpa-mcp-workshop.png
  social:
    - name: GitHub
      icon: mdi:github
      link: https://github.com/Azure-Samples/sherpa
    - name: Microsoft Azure
      icon: mdi:microsoft
      link: https://azure.microsoft.com

extra_css:
  - stylesheets/glightbox.min.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/glightbox.min.js
  - "https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"
  - "https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollToPlugin.min.js"
  - javascripts/extra.js
