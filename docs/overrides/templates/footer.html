<footer view-transition-name="footer"
  class="group-has-[.section-soft]/body:bg-surface/40 3xl:fixed:bg-transparent dark:bg-transparent">
  <div class="container-wrapper px-4 xl:px-6">
    <div class="flex h-(--footer-height) flex-wrap items-center justify-center gap-x-4 gap-y-1">
      {% if config.extra.social %}
      <div class="flex items-center gap-3">
        {% for s in config.extra.social %}
        <a href="{{ s.link }}" title="{{ s.name }}" target="_blank" rel="noopener noreferrer"
          class="text-muted-foreground hover:text-foreground transition-colors [&amp;_svg]:size-5">
          {{ s.icon | iconify }}
        </a>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </div>
</footer>
